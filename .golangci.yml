version: "2"

linters:
  default: none
  enable:
    - staticcheck
    - ineffassign
    - unused
    - nilerr
    - nilnil
    - unconvert
    - rowserrcheck
    - sqlclosecheck
    - noctx
    - misspell
    - errcheck
    - errorlint
    - bodyclose
    - gocritic
    - revive
    - dupl
    - nestif
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    staticcheck:
      checks:
        - all
        - "-QF*"
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - errorlint

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  relative-path-mode: gomod

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
